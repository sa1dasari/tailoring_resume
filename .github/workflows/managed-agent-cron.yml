name: Managed Agent Session Trigger

on:
  schedule:
    # 6:00 AM and 1:00 PM Eastern Time during standard time (11:00 and 18:00 UTC).
    - cron: "0 11,18 * * *"
  workflow_dispatch:
    inputs:
      session_input:
        description: Optional prompt override for this run
        required: false
        type: string

jobs:
  trigger-session:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Trigger managed agent session
        env:
          MANAGED_AGENTS_API_KEY: ${{ secrets.MANAGED_AGENTS_API_KEY }}
          MANAGED_AGENT_ID: ${{ secrets.MANAGED_AGENT_ID }}
          MANAGED_AGENTS_BASE_URL: ${{ secrets.MANAGED_AGENTS_BASE_URL }}
          SESSION_INPUT: ${{ github.event.inputs.session_input || secrets.SESSION_INPUT }}
          SESSION_PAYLOAD_JSON: ${{ secrets.SESSION_PAYLOAD_JSON }}
        run: python scripts/trigger_session.py

