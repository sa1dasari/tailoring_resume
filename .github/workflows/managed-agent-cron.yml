name: Managed Agent Session Trigger

on:
  schedule:
    # 8:00 AM and 5:00 PM Eastern Time on Wed, Fri, Sat, Sun (13:00 and 22:00 UTC standard time).
    - cron: "0 13,22 * * 0,3,5,6"
  workflow_dispatch:
    inputs:
      session_input:
        description: Optional prompt override for this run
        required: false
        type: string

jobs:
  trigger-session:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: python -m pip install python-dotenv

      - name: Trigger managed agent session
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          MANAGED_AGENT_ID: ${{ secrets.MANAGED_AGENT_ID }}
          MANAGED_AGENTS_BASE_URL: ${{ secrets.MANAGED_AGENTS_BASE_URL }}
          SESSION_ENVIRONMENT_ID: ${{ secrets.SESSION_ENVIRONMENT_ID }}
          ANTHROPIC_VERSION: 2023-06-01
          ANTHROPIC_BETA: managed-agents-2026-04-01
          VAULT_IDS: ${{ secrets.VAULT_IDS }}
          SESSION_INPUT: ${{ github.event.inputs.session_input || secrets.SESSION_INPUT }}
          SESSION_PAYLOAD_JSON: ${{ secrets.SESSION_PAYLOAD_JSON }}
        run: python scripts/trigger_session.py
